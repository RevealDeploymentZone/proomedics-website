<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Caduceus Symbol -->
  <g fill="#567C7C" transform="translate(5, 5)">
    <!-- Central staff -->
    <rect x="17" y="2" width="3" height="40" rx="1.5" fill="#567C7C"/>

    <!-- Top circle/sphere -->
    <circle cx="18.5" cy="4" r="3.5" fill="#567C7C"/>

    <!-- Wings (horizontal bars) -->
    <path d="M 10 18 L 8 16 L 10 14 L 15 16 L 10 18 Z" fill="#567C7C"/>
    <path d="M 27 18 L 29 16 L 27 14 L 22 16 L 27 18 Z" fill="#567C7C"/>

    <!-- Left snake -->
    <path d="M 15 20 Q 12 24, 11 28 Q 10 32, 12 36 Q 14 39, 16 41"
          stroke="#567C7C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="24" r="1.5" fill="#567C7C"/>
    <circle cx="11" cy="30" r="1.5" fill="#567C7C"/>
    <circle cx="14" cy="37" r="1.5" fill="#567C7C"/>

    <!-- Right snake -->
    <path d="M 22 20 Q 25 24, 26 28 Q 27 32, 25 36 Q 23 39, 21 41"
          stroke="#567C7C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="24" r="1.5" fill="#567C7C"/>
    <circle cx="26" cy="30" r="1.5" fill="#567C7C"/>
    <circle cx="23" cy="37" r="1.5" fill="#567C7C"/>

    <!-- Bowl at bottom -->
    <ellipse cx="18.5" cy="41" rx="6" ry="2.5" fill="#567C7C"/>
    <path d="M 12.5 41 L 12.5 44 Q 12.5 45.5, 14.5 45.5 L 22.5 45.5 Q 24.5 45.5, 24.5 44 L 24.5 41" fill="#567C7C"/>
  </g>

  <!-- Promedic Text -->
  <text x="55" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="#567C7C" letter-spacing="-0.5">Promedic</text>
</svg>
