name: Auto-Publish Scheduled Blogs

on:
  schedule:
    - cron: '0 13 * * *'   # 9am EST (UTC-4) = 13:00 UTC daily
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish due blogs to index
        run: python3 scripts/publish-blogs.py

      - name: Commit and push if changed
        run: |
          git config user.email "auto-publish@proomedic.com"
          git config user.name "Promedic Auto-Publisher"
          git add blog/index.html
          if git diff --staged --quiet; then
            echo "No new blogs to publish today."
          else
            git commit -m "Auto-publish scheduled blogs [skip ci]"
            git push
          fi
