name: Auto Generate Sitemap

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sitemap.xml'

permissions:
  contents: write

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          python3 << 'EOF'
          import os
          import glob
          from datetime import date

          BASE_URL = "https://www.proomedic.com"
          TODAY = date.today().isoformat()

          PRODUCT_PAGES = {"viagra", "cialis", "kamagra", "sildenafil", "levitra", "spedra"}

          EXCLUDE = {"404.html", "thankyou.html", "thank-you.html"}

          def get_url_info(filepath):
              filename = os.path.basename(filepath)
              name = filename.replace(".html", "")
              dirpath = os.path.dirname(filepath)

              if filename in EXCLUDE:
                  return None

              if filepath == "index.html":
                  url = BASE_URL + "/"
                  priority = "1.0"
                  changefreq = "weekly"
              elif dirpath.startswith("blog"):
                  url = BASE_URL + "/blog/" + name
                  priority = "0.8"
                  changefreq = "monthly"
              elif name in PRODUCT_PAGES:
                  url = BASE_URL + "/" + name
                  priority = "0.9"
                  changefreq = "weekly"
              else:
                  url = BASE_URL + "/" + name
                  priority = "0.6"
                  changefreq = "monthly"

              return (url, priority, changefreq)

          html_files = glob.glob("*.html") + glob.glob("blog/*.html")

          def sort_key(f):
              name = os.path.basename(f).replace(".html", "")
              if f == "index.html": return (0, "")
              elif name in PRODUCT_PAGES: return (1, name)
              elif f.startswith("blog/"): return (3, name)
              else: return (2, name)

          html_files.sort(key=sort_key)

          entries = []
          for f in html_files:
              info = get_url_info(f)
              if info:
                  url, priority, changefreq = info
                  entries.append(f"  <url>\n    <loc>{url}</loc>\n    <lastmod>{TODAY}</lastmod>\n    <changefreq>{changefreq}</changefreq>\n    <priority>{priority}</priority>\n  </url>")

          sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n'
          sitemap += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          sitemap += "\n".join(entries)
          sitemap += "\n</urlset>\n"

          with open("sitemap.xml", "w") as f:
              f.write(sitemap)

          print(f"Generated sitemap.xml with {len(entries)} URLs")
          EOF

      - name: Commit and push sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to sitemap.xml"
          else
            git commit -m "chore: auto-update sitemap.xml [skip ci]"
            git push
          fi
